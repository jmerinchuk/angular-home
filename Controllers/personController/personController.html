<div ng-controller="personController" class="person-controller" ng-init="">
    <h1>Person Controller Data</h1>
    <p>First Name: <input type="text" ng-model="firstName"></p>
    <p>Last Name: <input type="text" ng-model="lastName"></p>
    <p>Full Name: {{firstName + " " + lastName}}</p>
    <p>Full Name2: {{fullName()}}</p>
    <p>Last Name with Filter: {{lastName | uppercase }}</p>
</div>
